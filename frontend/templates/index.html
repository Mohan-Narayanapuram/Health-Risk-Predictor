<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Health Risk Predictor</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Health Risk Predictor</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% if load_error %}
            <div class="alert alert-danger" role="alert">
                {{ load_error }}
            </div>
        {% endif %}

        <div class="card shadow-sm p-4 mb-5">
            <h2 class="card-title mb-3 text-primary">Enter Your Health Details</h2>
            <form method="POST" action="{{ url_for('predict') }}">
                <div class="row g-3">
                    <!-- Gender -->
                    <div class="col-md-6">
                        <label for="male" class="form-label">Gender</label>
                        <select class="form-select" id="male" name="male" required>
                            <option value="Female">Female</option>
                            <option value="Male">Male</option>
                        </select>
                    </div>
                    <!-- Age -->
                    <div class="col-md-6">
                        <label for="age" class="form-label">Age</label>
                        <input type="number" class="form-control" id="age" name="age" min="20" max="120" value="35" required>
                    </div>
                    <!-- Smoking -->
                    <div class="col-md-6">
                        <label for="currentSmoker" class="form-label">Do you smoke?</label>
                        <select class="form-select" id="currentSmoker" name="currentSmoker" required>
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="cigsPerDay" class="form-label">Cigarettes per day</label>
                        <input type="number" class="form-control" id="cigsPerDay" name="cigsPerDay" min="0" max="60" value="0">
                    </div>
                    <!-- Stroke -->
                    <div class="col-md-6">
                        <label for="prevalentStroke" class="form-label">History of Stroke?</label>
                        <select class="form-select" id="prevalentStroke" name="prevalentStroke" required>
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>
                    <!-- Hypertension -->
                    <div class="col-md-6">
                        <label for="prevalentHyp" class="form-label">Hypertension?</label>
                        <select class="form-select" id="prevalentHyp" name="prevalentHyp" required>
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>
                    <!-- Diabetes -->
                    <div class="col-md-6">
                        <label for="diabetes" class="form-label">Diabetes?</label>
                        <select class="form-select" id="diabetes" name="diabetes" required>
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>
                    <!-- Total Cholesterol -->
                    <div class="col-md-6">
                        <label for="totChol" class="form-label">Total Cholesterol (mg/dL)</label>
                        <input type="number" class="form-control" id="totChol" name="totChol" min="100" max="400" value="180" required>
                    </div>
                    <!-- BMI -->
                    <div class="col-md-6">
                        <label for="BMI" class="form-label">Body Mass Index (BMI)</label>
                        <input type="number" class="form-control" id="BMI" name="BMI" min="15" max="45" step="0.1" value="22.5" required>
                    </div>
                    <!-- Heart Rate -->
                    <div class="col-md-6">
                        <label for="heartRate" class="form-label">Resting Heart Rate</label>
                        <input type="number" class="form-control" id="heartRate" name="heartRate" min="40" max="120" value="72" required>
                    </div>
                    <!-- Glucose -->
                    <div class="col-md-6">
                        <label for="glucose" class="form-label">Glucose Level (mg/dL)</label>
                        <input type="number" class="form-control" id="glucose" name="glucose" min="50" max="250" value="90" required>
                    </div>
                    <!-- Pulse Pressure -->
                    <div class="col-md-6">
                        <label for="pulse_pressure" class="form-label">Pulse Pressure</label>
                        <input type="number" class="form-control" id="pulse_pressure" name="pulse_pressure" min="30" max="80" value="45" required>
                    </div>
                </div>

                <div class="mt-4 d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Predict Health Risk</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
